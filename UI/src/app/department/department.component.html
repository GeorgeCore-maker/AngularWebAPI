<div class="m-3">
  <div class="card">
    <!-- Toolbar con botón de crear -->
    <p-toolbar styleClass="mb-4">
      <ng-template pTemplate="left">
        <h2 class="m-0">Departments</h2>
      </ng-template>
      <ng-template pTemplate="right">
        <p-button
          label="New Department"
          icon="pi pi-plus"
          severity="success"
          (onClick)="openNewDepartment()">
        </p-button>
      </ng-template>
    </p-toolbar>

    <!-- Tabla de departamentos -->
    <p-table [value]="departmentList" styleClass="p-datatable-gridlines" [tableStyle]="{ 'min-width': '50rem' }">
      <ng-template pTemplate="header">
        <tr>
          <th>Department ID</th>
          <th>Department Name</th>
          <th>Options</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-department>
        <tr>
          <td>{{ department.DepartmentId }}</td>
          <td>{{ department.DepartmentName }}</td>
          <td>
            <p-button
              icon="pi pi-pencil"
              severity="info"
              [rounded]="true"
              [text]="true"
              pTooltip="Edit"
              (onClick)="editDepartment(department)">
            </p-button>
            <p-button
              icon="pi pi-trash"
              severity="danger"
              [rounded]="true"
              [text]="true"
              pTooltip="Delete"
              (onClick)="deleteDepartment(department)">
            </p-button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <!-- Componente modal -->
  <app-show-department
    [(displayModal)]="displayModal"
    [isEditMode]="isEditMode"
    [department]="department"
    (onSave)="onModalSave()">
  </app-show-department>
</div>
