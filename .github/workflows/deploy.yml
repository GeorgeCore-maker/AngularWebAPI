name: Deploy Angular App to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './UI/package-lock.json'
        
    - name: Install dependencies
      run: |
        cd UI
        npm ci
        
    - name: Build Angular App
      run: |
        cd UI
        npm run build -- --base-href="/AngularWebAPI/"
        
    - name: Copy 404.html to browser folder
      run: |
        cp ./UI/public/404.html ./UI/dist/ui/browser/404.html
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./UI/dist/ui/browser
        force_orphan: true
        cname: false
